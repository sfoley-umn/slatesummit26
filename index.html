<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Summit Team Planner</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#f6f7fb;
  color:#111827;
}

/* Header */
.top{
  background:linear-gradient(90deg,#7a0019,#9b0a2a);
  color:white;
  padding:18px;
  border-bottom:4px solid rgba(255,255,255,.1);
}

.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:18px;
}

/* Cards */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  margin-bottom:12px;
}

/* Controls */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

input,select{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:white;
}

/* Buttons */
button{
  cursor:pointer;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#fff;
  font-weight:500;
}

button.active{
  background:#dcfce7;
  border-color:#22c55e;
}

/* Layout */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
}

@media(max-width:1000px){
  .grid{grid-template-columns:1fr}
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stat{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* Session grouping */
.day-header{
  margin:18px 0 10px;
  font-weight:700;
  font-size:16px;
  color:#7a0019;
}

.time-header{
  margin:10px 0;
  font-weight:600;
  font-size:13px;
  color:#374151;
}

/* Session card */
.session-title{
  font-weight:700;
  margin-bottom:4px;
}

.meta{
  font-size:12px;
  color:#6b7280;
  margin-bottom:10px;
}

.avatars{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.avatar{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  background:#e0e7ff;
}

/* View toggle */
.view-toggle{
  display:flex;
  gap:10px;
  margin:12px 0;
}

.view-btn.active-view{
  background:#7a0019;
  color:white;
  border-color:#7a0019;
}

.small{font-size:12px;color:#6b7280}
</style>
</head>

<body>

<div class="top">
  <h2 style="margin:0">Slate Summit Team Planner</h2>
  <div class="small" style="color:#f3f4f6">Live summit schedule + team planning</div>
</div>

<div class="wrap">

  <div class="view-toggle">
    <button id="individualBtn" class="view-btn active-view" onclick="setView('individual')">
      Individual
    </button>
    <button id="teamBtn" class="view-btn" onclick="setView('team')">
      Team
    </button>
  </div>

  <div class="grid">

    <!-- LEFT -->
    <div>

      <div class="card">
        <div class="controls">

          <!-- NAME DROPDOWN -->
          <select id="name" onchange="saveName()">
            <option value="">Select name</option>
            <option>Austin</option>
            <option>Elma</option>
            <option>Kelsey</option>
            <option>Kristin</option>
            <option>Sean</option>
          </select>

          <input id="search" placeholder="Search sessions" oninput="render()" />

          <select id="dayFilter" onchange="render()">
            <option value="">All days</option>
          </select>

          <select id="timeFilter" onchange="render()">
            <option value="">All times</option>
          </select>

        </div>
      </div>

      <div id="sessions"></div>

    </div>

    <!-- RIGHT -->
    <div>

      <div class="card">
        <h3 style="margin-top:0">Team Summary</h3>

        <div class="stats">
          <div class="stat">
            <div id="statSessions">0</div>
            <div class="small">Sessions</div>
          </div>
          <div class="stat">
            <div id="statSelected">0</div>
            <div class="small">My Picks</div>
          </div>
          <div class="stat">
            <div id="statPeople">0</div>
            <div class="small">People</div>
          </div>
        </div>

        <div id="teamRoster"></div>
      </div>

    </div>

  </div>
</div>

<script>

const API_URL =
'https://slate--partners-technolutions-net.cdn.technolutions.net/portal/public-summit-schedule?cmd=search&cache=900';

const SHEET_API =
'https://script.google.com/macros/s/AKfycbz8EvFEf0-1-rqyTb-KExaMK8uagfoaYL4-hoLcqabj5CYVs02jjmqAqMy08-CKDgVB/exec';

let currentUser = localStorage.getItem('summitUser') || '';
let sessions = [];
let picks = {};
let currentView = 'individual';

function saveName(){
  currentUser = document.getElementById('name').value;
  localStorage.setItem('summitUser', currentUser);
  render();
}

function setView(v){
  currentView = v;
  document.getElementById('individualBtn').classList.toggle('active-view', v==='individual');
  document.getElementById('teamBtn').classList.toggle('active-view', v==='team');
  render();
}

function safe(v){
  return String(v||'').replace(/[&<>]/g,m=>({
    '&':'&amp;','<':'&lt;','>':'&gt;'
  }[m]));
}

/* ---------- LOAD ---------- */
async function loadSessions(){

  const res = await fetch(API_URL);
  const txt = await res.text();

  const doc = new DOMParser().parseFromString(txt,'text/html');
  const rows = [...doc.querySelectorAll('tbody tr')];
  const headers = [...doc.querySelectorAll('thead th')].map(h=>h.textContent.trim());

  sessions = rows.map((tr,i)=>{
    const obj = {};
    [...tr.children].forEach((td,j)=>obj[headers[j]]=td.textContent.trim());

    return {
      id:'s'+i,
      title:obj['Session Title'] || '',
      day:obj['Day'] || '',
      time:obj['Time'] || '',
      location:obj['Location'] || '',
    };
  });

  populateFilters();
  document.getElementById('sessions').innerHTML='';
  render();
}

/* ---------- FILTERS ---------- */
function populateFilters(){

  const days = [...new Set(sessions.map(s=>s.day).filter(Boolean))];
  const times = [...new Set(sessions.map(s=>s.time).filter(Boolean))];

  const daySel = document.getElementById('dayFilter');
  const timeSel = document.getElementById('timeFilter');

  days.sort().forEach(d=>{
    const o=document.createElement('option');
    o.value=o.textContent=d;
    daySel.appendChild(o);
  });

  times.sort().forEach(t=>{
    const o=document.createElement('option');
    o.value=o.textContent=t;
    timeSel.appendChild(o);
  });
}

/* ---------- PICKS ---------- */
async function listenPicks(){
  const r = await fetch(SHEET_API);
  const data = await r.json();

  picks = {};
  data.forEach(row=>{
    if(!picks[row.sessionId]) picks[row.sessionId]={};
    picks[row.sessionId][row.userName]={
      selected: row.selected === true || row.selected === 'TRUE',
      rating: Number(row.rating||0)
    };
  });

  render();
}

/* ---------- SAVE ---------- */
async function saveSelection(id,title,selected,rating){

  const form = new URLSearchParams();
  form.append('sessionId',id);
  form.append('sessionTitle',title);
  form.append('userName',currentUser);
  form.append('selected',selected);
  form.append('rating',rating);

  await fetch(SHEET_API,{method:'POST',body:form});
  listenPicks();
}

/* ---------- ACTIONS ---------- */
function togglePick(id){
  if(!currentUser) return alert('Select a name first');

  const s = sessions.find(x=>x.id===id);
  const ex = picks?.[id]?.[currentUser];

  saveSelection(id,s.title,!(ex?.selected),ex?.rating||0);
}

/* ---------- RENDER ---------- */
function render(){

  const q = document.getElementById('search').value.toLowerCase();
  const day = document.getElementById('dayFilter').value;
  const time = document.getElementById('timeFilter').value;

  const filtered = sessions.filter(s=>
    (!q || s.title.toLowerCase().includes(q)) &&
    (!day || s.day===day) &&
    (!time || s.time===time)
  ).sort((a,b)=>a.day.localeCompare(b.day)||a.time.localeCompare(b.time));

  const el = document.getElementById('sessions');

  const allUsers = [...new Set(Object.values(picks).flatMap(x=>Object.keys(x||{})))];

  document.getElementById('statSessions').textContent = sessions.length;
  document.getElementById('statPeople').textContent = allUsers.length;
  document.getElementById('statSelected').textContent =
    filtered.filter(s=>picks?.[s.id]?.[currentUser]?.selected).length;

  document.getElementById('teamRoster').innerHTML =
    allUsers.map(u=>`<div class="small">• ${u}</div>`).join('');

  if(currentView==='team'){
    const selected = filtered.filter(s=>
      Object.values(picks[s.id]||{}).some(v=>v.selected)
    );

    el.innerHTML = selected.map(s=>{
      const users = Object.entries(picks[s.id]||{}).filter(([_,v])=>v.selected);

      return `
        <div class="card">
          <div class="session-title">${safe(s.title)}</div>
          <div class="meta">${s.day} • ${s.time} • ${s.location}</div>
          <div class="small">${users.length} attending</div>
        </div>
      `;
    }).join('');

    return;
  }

  /* INDIVIDUAL VIEW WITH GROUPING */
  let html='';
  let lastDay='', lastTime='';

  filtered.forEach(s=>{

    if(s.day!==lastDay){
      html+=`<div class="day-header">${s.day}</div>`;
      lastDay=s.day;
      lastTime='';
    }

    if(s.time!==lastTime){
      html+=`<div class="time-header">${s.time}</div>`;
      lastTime=s.time;
    }

    const mine = picks?.[s.id]?.[currentUser]?.selected;

    html+=`
      <div class="card">
        <div class="session-title">${safe(s.title)}</div>
        <div class="meta">${s.location}</div>

        <button class="${mine?'active':''}" onclick="togglePick('${s.id}')">
          ${mine?'Selected':'Select'}
        </button>
      </div>
    `;
  });

  el.innerHTML = html || `<div class="card">No sessions found</div>`;
}

/* INIT */
loadSessions();
listenPicks();

</script>

</body>
</html>
