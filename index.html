<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Summit Team Planner</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box} body{font-family:system-ui,-apple-system,sans-serif;margin:0;background:#f5f7fb;color:#1f2937}
.wrap{max-width:1200px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.session{margin-bottom:10px}.pill{display:inline-block;background:#eef2ff;color:#4338ca;padding:3px 8px;border-radius:999px;font-size:11px;margin:2px 4px 0 0}
button{cursor:pointer;padding:7px 10px;border-radius:8px;border:1px solid #d1d5db;background:#fff} button.active{background:#dcfce7;border-color:#22c55e}
input,select{padding:8px;border-radius:8px;border:1px solid #d1d5db} .small{font-size:12px;color:#6b7280}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}@media(max-width:900px){.grid{grid-template-columns:1fr}}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{padding:10px;border-radius:10px;background:#f9fafb;text-align:center}
.session-title{font-weight:600;font-size:15px;margin-bottom:4px;cursor:pointer}.meta{font-size:12px;color:#6b7280;margin-bottom:8px}.avatars{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.avatar{background:#e0e7ff;border-radius:999px;padding:4px 8px;font-size:11px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h2 style="margin:0">Slate Summit Team Planner</h2>
      <div class="small">Live summit schedule + shared coworker selections</div>
    </div>
    <div id="status" class="small">Loading…</div>
  </div>

  <div class="grid">
    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="controls">
          <input id="name" placeholder="Your name" />
          <button onclick="saveName()">Set Name</button>
          <input id="search" placeholder="Search sessions" oninput="render()" />
          <select id="dayFilter" onchange="render()"><option value="">All days</option></select>
        </div>
      </div>
      <div id="sessions"></div>
    </div>

    <div>
      <div class="card">
        <h3 style="margin-top:0">Team Summary</h3>
        <div class="stats">
          <div class="stat"><div id="statSessions">0</div><div class="small">Sessions</div></div>
          <div class="stat"><div id="statSelected">0</div><div class="small">My Picks</div></div>
          <div class="stat"><div id="statPeople">0</div><div class="small">Team Members</div></div>
        </div>
        <div id="teamRoster"></div>
      </div>
    </div>
  </div>
</div>
<script>
const API_URL='https://slate--partners-technolutions-net.cdn.technolutions.net/portal/public-summit-schedule?cmd=search&cache=900&level=&track=&day=';

const firebaseConfig={
  apiKey:'AIzaSyCfipy-czbudi0lJdSwhin6wyl2s_qEiro',
  authDomain:'slatesummit26.firebaseapp.com',
  databaseURL:'https://slatesummit26-default-rtdb.firebaseio.com',
  projectId:'slatesummit26',
  storageBucket:'slatesummit26.firebasestorage.app',
  messagingSenderId:'574078814775',
  appId:'1:574078814775:web:9e6b9efe006129e8b0cdb2'
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentUser=localStorage.getItem('summitUser')||'';
let sessions=[];
let picks={};
if(currentUser) document.getElementById('name').value=currentUser;

function saveName(){ currentUser=document.getElementById('name').value.trim(); localStorage.setItem('summitUser',currentUser); render(); }
function safe(v){ return String(v||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function initials(n){ return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }

async function loadSessions(){
  try{
    const res=await fetch(API_URL);
    const txt=await res.text();
    const doc=new DOMParser().parseFromString(txt,'text/html');
    const table=doc.querySelector('table');
    const rows=[...table.querySelectorAll('tbody tr')];
    const headers=[...table.querySelectorAll('thead th')].map(th=>th.textContent.trim());
    sessions=rows.map((tr,i)=>{ const obj={}; [...tr.children].forEach((td,j)=>obj[headers[j]]=td.textContent.trim()); return {id:'s'+i,title:obj['Session Title']||Object.values(obj)[0],day:obj['Day']||'',time:obj['Time']||'',track:obj['Track']||'',raw:obj}; });
    const days=[...new Set(sessions.map(s=>s.day).filter(Boolean))];
    const dayFilter=document.getElementById('dayFilter'); days.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d; dayFilter.appendChild(o); });
    document.getElementById('status').textContent=`Loaded ${sessions.length} live sessions`;
  }catch(e){ document.getElementById('status').textContent='Could not load live sessions'; }
  render();
}
function listenPicks(){ db.ref('summit2026').on('value',snap=>{ picks=snap.val()||{}; render(); }); }
function togglePick(id){ if(!currentUser){ alert('Set your name first'); return; } const path=`summit2026/${id}/${currentUser.replace(/[.#$\[\]]/g,'_')}`; const existing=picks?.[id]?.[currentUser.replace(/[.#$\[\]]/g,'_')]; db.ref(path).set(existing?null:true); }
function render(){
  const q=document.getElementById('search').value.toLowerCase(); const day=document.getElementById('dayFilter').value;
  const filtered=sessions.filter(s=>(!q||safe(s.title).toLowerCase().includes(q))&&(!day||s.day===day));
  document.getElementById('statSessions').textContent=sessions.length;
  document.getElementById('statSelected').textContent=currentUser?filtered.filter(s=>picks?.[s.id]?.[currentUser.replace(/[.#$\[\]]/g,'_')]).length:0;
  const allUsers=[...new Set(Object.values(picks).flatMap(x=>Object.keys(x||{})))];
  document.getElementById('statPeople').textContent=allUsers.length;
  document.getElementById('teamRoster').innerHTML=allUsers.length?allUsers.map(u=>`<div class='small'>• ${u}</div>`).join(''):'<div class="small">No selections yet</div>';
  const el=document.getElementById('sessions'); el.innerHTML='';
  filtered.forEach(s=>{
    const users=Object.keys(picks[s.id]||{}); const myKey=currentUser.replace(/[.#$\[\]]/g,'_'); const mine=users.includes(myKey);
    const div=document.createElement('div'); div.className='card session';
    div.innerHTML=`<div class='session-title'>${safe(s.title)}</div><div class='meta'>${safe(s.day)} ${safe(s.time)} ${safe(s.track)}</div><button class='${mine?'active':''}' onclick="togglePick('${s.id}')">${mine?'✓ Selected':'Select session'}</button><div class='avatars'>${users.map(u=>`<span class='avatar'>${u}</span>`).join('')}</div>`;
    el.appendChild(div);
  });
}
loadSessions(); listenPicks();
</script>
</body>
</html>
