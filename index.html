<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Summit Team Planner</title>

<style>
body{font-family:system-ui;margin:0;background:#f5f7fb;color:#1f2937}
.wrap{max-width:1400px;margin:auto;padding:18px}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:12px}
.small{font-size:12px;color:#6b7280}

.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select{padding:8px;border:1px solid #ddd;border-radius:8px}

button{padding:8px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
button.active{background:#dcfce7;border-color:#22c55e}

.grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:1000px){.grid{grid-template-columns:1fr}}

.session-title{font-weight:600}
.meta{font-size:12px;color:#666;margin-bottom:8px}

.day-header{
  margin:18px 0 8px;
  font-size:14px;
  font-weight:700;
  color:#111827;
}

.time-header{
  margin:12px 0 6px;
  font-size:13px;
  font-weight:600;
  color:#374151;
}

.avatar{background:#e0e7ff;padding:4px 8px;border-radius:999px;font-size:11px;margin:2px;display:inline-block}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <div class="controls">

    <select id="name"></select>

    <button onclick="saveName()">Set Name</button>

    <input id="search" placeholder="Search sessions" oninput="render()"/>

    <select id="dayFilter" onchange="render()"></select>

    <select id="timeFilter" onchange="render()"></select>

  </div>
</div>

<div class="grid">

  <div id="sessions"></div>

  <div class="card">
    <div class="small">Team Summary</div>
    <div id="teamRoster"></div>
  </div>

</div>

</div>

<script>

const SHEET_API =
'https://script.google.com/macros/s/AKfycbz8EvFEf0-1-rqyTb-KExaMK8uagfoaYL4-hoLcqabj5CYVs02jjmqAqMy08-CKDgVB/exec';

const NAMES = ["Austin","Elma","Kelsey","Kristin","Sean"];

let sessions = [];
let picks = {};
let currentUser = localStorage.getItem("user") || "";

//
// INIT NAME DROPDOWN
//
const nameSelect = document.getElementById("name");
NAMES.forEach(n=>{
  const o=document.createElement("option");
  o.value=n;
  o.textContent=n;
  nameSelect.appendChild(o);
});
if(currentUser) nameSelect.value=currentUser;

function saveName(){
  currentUser = nameSelect.value;
  localStorage.setItem("user",currentUser);
}

function safe(v){
  return String(v||'').replace(/[&<>]/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[m]));
}

//
// LOAD SESSIONS (FAST PARSE)
//
async function loadSessions(){

  const res = await fetch(SHEET_API);
  const data = await res.json();

  // build pick map
  picks = {};
  data.forEach(r=>{
    if(!picks[r.sessionId]) picks[r.sessionId]={};
    picks[r.sessionId][r.userName]=r;
  });

  render();
}

//
// BUILD FILTER OPTIONS ONCE
//
function buildFilters(){

  const days = [...new Set(sessions.map(s=>s.day).filter(Boolean))];
  const times = [...new Set(sessions.map(s=>s.time).filter(Boolean))];

  const daySel = document.getElementById("dayFilter");
  const timeSel = document.getElementById("timeFilter");

  if(daySel.options.length===0){
    daySel.innerHTML = `<option value="">All days</option>` +
      days.map(d=>`<option>${d}</option>`).join('');
  }

  if(timeSel.options.length===0){
    timeSel.innerHTML = `<option value="">All times</option>` +
      times.map(t=>`<option>${t}</option>`).join('');
  }
}

//
// RENDER
//
function render(){

  const q = document.getElementById("search").value.toLowerCase();
  const day = document.getElementById("dayFilter").value;
  const time = document.getElementById("timeFilter").value;

  const el = document.getElementById("sessions");
  el.innerHTML = "";

  buildFilters();

  const filtered = sessions.filter(s=>
    (!q || s.title.toLowerCase().includes(q)) &&
    (!day || s.day===day) &&
    (!time || s.time===time)
  );

  // group by day + time
  const grouped = {};

  filtered.forEach(s=>{
    grouped[s.day] ??= {};
    grouped[s.day][s.time] ??= [];
    grouped[s.day][s.time].push(s);
  });

  for(const d of Object.keys(grouped)){

    el.innerHTML += `<div class="day-header">${d}</div>`;

    for(const t of Object.keys(grouped[d])){

      el.innerHTML += `<div class="time-header">${t}</div>`;

      grouped[d][t].forEach(s=>{

        const users = picks[s.id] || {};
        const selected = Object.values(users).filter(u=>u.selected);

        const mine = users[currentUser]?.selected;

        el.innerHTML += `
          <div class="card">
            <div class="session-title">${safe(s.title)}</div>

            <div class="meta">
              ${s.day} • ${s.time} • ${s.raw?.Location || "No location"}
            </div>

            <button class="${mine?'active':''}"
              onclick="toggle('${s.id}','${safe(s.title)}')">
              ${mine ? "Selected" : "Select"}
            </button>

            <div class="small">
              ${selected.length} attending
            </div>

            <div>
              ${selected.map(u=>`<span class="avatar">${u.userName}</span>`).join("")}
            </div>
          </div>
        `;
      });
    }
  }
}

//
// TOGGLE
//
async function toggle(id,title){

  if(!currentUser) return alert("Pick name");

  const existing = picks[id]?.[currentUser];

  await fetch(SHEET_API,{
    method:"POST",
    body:new URLSearchParams({
      sessionId:id,
      sessionTitle:title,
      userName:currentUser,
      selected: !existing?.selected,
      rating: existing?.rating || 0
    })
  });

  loadSessions();
}

//
// BOOT
//
async function init(){

  const res = await fetch(SHEET_API);
  const data = await res.json();

  // build session list from sheet data (fast path)
  const map = new Map();

  data.forEach(r=>{
    if(!map.has(r.sessionId)){
      map.set(r.sessionId,{
        id:r.sessionId,
        title:r.sessionTitle,
        day:r.day || "",
        time:r.time || "",
        raw:r
      });
    }
  });

  sessions = [...map.values()];

  await loadSessions();
}

init();

</script>
</body>
</html>
